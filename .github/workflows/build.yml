name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. نحمل الكود
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. نثبت Java 25 (مطلوب لـ MC 26.1.2)
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # 3. بنحمل الـ jar الناقص زي المرة اللي فاتت
      - name: Download missing gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -Lo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v9.4.0/gradle/wrapper/gradle-wrapper.jar

      # 4. التعديل الجديد: استخدام الأكشن الرسمي لـ Gradle لتجنب مشاكل الشبكة والتحميل
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 5. نديه صلاحية التشغيل
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. نبني المود
      - name: Build mod
        run: ./gradlew build --no-daemon

      # 7. نرفع الـ JAR كـ artifact دايماً
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: testmod-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

  # Release تلقائي لما تعمل tag بيبدأ بـ v
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Download missing gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -Lo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v9.4.0/gradle/wrapper/gradle-wrapper.jar

      # إعداد Gradle في مرحلة الـ Release أيضاً لمنع الإيرور
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build mod
        run: ./gradlew build --no-daemon

      # ننشر GitHub Release مع الـ JAR
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          name: "TestMod ${{ github.ref_name }}"
          body: |
            ## TestMod ${{ github.ref_name }}
            
            مود يحسب الساعات والدقائق منذ بدء العالم 🕐
            
            ### متمتطلبات التشغيل
            - Minecraft Java Edition **26.1.2**
            - Fabric Loader **0.18.4+**
            - Fabric API **0.149.1+26.1.2**
          draft: false
          prerelease: false
