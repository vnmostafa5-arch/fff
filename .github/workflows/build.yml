name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. تحميل كود المود من المستودع
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. تثبيت Java 25 (المطلوبة لإصدار ماين كرافت 26.1.2)
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # 3. تثبيت Gradle 9.4 رسمي ومضمون مباشرة في السيرفر
      # تم اختيار 9.4 لأنه متوافق تماماً وموجود في قاعدة بيانات جيت هب ويغطي شرط الـ Loom (أعلى من 9.2)
      - name: Setup Gradle 9.4 (Bulletproof Setup)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4'
          cache-disabled: false

      # 4. بناء المود باستخدام نسخة Gradle 9.4 المثبتة بالسيرفر
      - name: Build mod with Global Gradle 9.4
        run: gradle build --no-daemon

      # 5. رفع ملف الـ JAR النهائي الناتج عن البناء
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: testmod-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle 9.4 (Bulletproof Setup)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4'

      - name: Build mod with Global Gradle 9.4
        run: gradle build --no-daemon

      # إنشاء الـ GitHub Release ونشر المود تلقائياً
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          name: "TestMod ${{ github.ref_name }}"
          body: |
            ## TestMod ${{ github.ref_name }} 🎉
            مود يحسب الساعات والدقائق منذ بدء العالم 🕐
            
            ### متطلبات التشغيل:
            - Minecraft Java Edition **26.1.2**
            - Fabric Loader
            - Java 25
          draft: false
          prerelease: false
