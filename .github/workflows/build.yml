name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. نحمل كود المود
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. نثبت Java 25 (مطلوب لـ MC 26.1.2)
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # 3. الحل الجديد: توليد ملف الـ Wrapper الأصلي السليم تماماً باستخدام Gradle المثبت في السيرفر
      - name: Generate Valid Gradle Wrapper
        run: gradle wrapper --gradle-version 8.10

      # 4. إعداد الـ Gradle Action الرسمي
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 5. إعطاء صلاحية التشغيل
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. بناء المود
      - name: Build mod
        run: ./gradlew build --no-daemon

      # 7. رفع الـ JAR النهائي كـ Artifact
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: testmod-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # توليد الـ Wrapper السليم في مرحلة الـ Release أيضاً
      - name: Generate Valid Gradle Wrapper
        run: gradle wrapper --gradle-version 8.10

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build mod
        run: ./gradlew build --no-daemon

      # نشر الـ Release على جيت هب
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          name: "TestMod ${{ github.ref_name }}"
          body: |
            ## TestMod ${{ github.ref_name }}
            مود يحسب الساعات والدقائق منذ بدء العالم 🕐
          draft: false
          prerelease: false
